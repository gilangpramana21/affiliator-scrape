version: "3.9"

services:
  scraper:
    build: .
    container_name: affiliator-scraper
    volumes:
      - ./config:/app/config
      - ./output:/app/output
      - ./logs:/app/logs
    command: python main.py --config config/config.safe.json
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: affiliator-redis
    ports:
      - "6379:6379"
